<nav class="relative flex flex-wrap justify-between items-center bg-white px-4 sm:px-6 lg:px-20 py-4 shadow-md shadow-gray-200">
    <div>
        <h1 class="text-xl sm:text-2xl lg:text-3xl font-bold text-[#FF69B4]">{{titre}}</h1>
    </div>

    <button
        (click)="isOpen = !isOpen"
        [attr.aria-expanded]="isOpen"
        aria-label="Ouvrir le menu de navigation"
        aria-controls="main-menu"
        class="lg:hidden text-violet-500 focus:outline-none focus:ring-2 focus:ring-violet-400 rounded z-50 p-1"
    >
        <svg class="w-7 h-7 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            @if (isOpen) {
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            } @else {
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
            }
        </svg>
    </button>

    <div
        id="main-menu"
        class="overflow-hidden transition-all duration-300 ease-in-out
               absolute top-full left-0 w-full bg-white rounded-b-3xl shadow-lg z-40
               lg:static lg:w-auto lg:overflow-visible lg:shadow-none lg:bg-transparent lg:rounded-none"
        [class.max-h-0]="!isOpen"
        [class.max-h-96]="isOpen"
        [class.lg:max-h-none]="true"
    >
        <ul class="flex flex-col lg:flex-row items-center gap-2 sm:gap-3 p-4 lg:p-0">
            @for (item of liste; track item.route) {
                <li class="w-full lg:w-auto text-center">
                    <a [routerLink]="item.route"
                       routerLinkActive="text-violet-900 font-bold underline"
                       (click)="isOpen = false"
                       class="block px-4 py-2 text-base sm:text-lg lg:text-xl font-medium text-violet-500 transition-colors duration-200 hover:text-violet-800 hover:underline">
                        {{item.label}}
                    </a>
                </li>
            } @empty {
                <li class="text-gray-400 italic py-2">Aucun élément</li>
            }
        </ul>
    </div>
</nav>
